version: '3.8'

services:
  rankmatrix-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_MANAGMENT_ID: ${NEXT_PUBLIC_GOOGLE_MANAGMENT_ID}
        NEXT_PUBLIC_GOOGLE_AD_ID: ${NEXT_PUBLIC_GOOGLE_AD_ID}
    ports:
      - '3000:3000'
    volumes:
      - .:/rankmatrix
      - /rankmatrix/node_modules
    command: pnpm run dev
    env_file:
      - .env
    stdin_open: true
    tty: true
    restart: always
